<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SpeakScript - Coding for Kids</title>

  <!-- Local Bootstrap -->
  <link rel="stylesheet" href="assets/css/bootstrap.min.css" />
  <!-- Custom Styles -->
  <link rel="stylesheet" href="assets/css/style.css" />

  <!-- Preconnect for fonts if online, fallback to sans-serif locally -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600&family=Fira+Code:wght@400;600&display=swap" rel="stylesheet">
  
  <!-- Open Graph Meta Tags -->
  <meta property="og:title" content="SpeakScript - Coding for Kids" />
  <meta property="og:description" content="A magically easy programming language for kids! Write simple English code, watch your story come alive." />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://mostakahmad.github.io/kiddy/" />
  <!-- A beautiful gradient placeholder image generated via placehold.co or similar, or you can use your own image URL -->
  <meta property="og:image" content="https://placehold.co/1200x630/27ae60/white.png?text=SpeakScript:+Coding+for+Kids" />
  
  <!-- Twitter Card Meta Tags -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="SpeakScript - Coding for Kids" />
  <meta name="twitter:description" content="A magically easy programming language for kids! Write simple English code, watch your story come alive." />
  <meta name="twitter:image" content="https://placehold.co/1200x630/27ae60/white.png?text=SpeakScript:+Coding+for+Kids" />
</head>
<body>

  <!-- NAVBAR -->
  <nav class="navbar navbar-expand bg-white border-bottom shadow-sm fixed-top" style="z-index: 1030;">
    <div class="container-fluid">
      <div class="d-flex align-items-center">
        <button class="btn btn-light me-2 border border-secondary border-opacity-25 d-flex align-items-center justify-content-center shadow-sm" type="button" data-bs-toggle="offcanvas" data-bs-target="#leftMenu" aria-controls="leftMenu" style="width: 44px; height: 44px;" title="Open Menu">
          <span class="fs-5">☰</span>
        </button>
        <a class="navbar-brand fw-bold text-dark m-0 d-flex align-items-center" href="#">
          <span class="fs-4 me-1">✨</span> SpeakScript
        </a>
        <span class="d-none d-lg-inline text-muted ms-3 small border-start ps-3 border-2 fw-medium">Write simple English code. Watch your story come alive!</span>
      </div>
      <div class="d-flex align-items-center gap-2">
        <div class="dropdown">
          <button class="btn btn-outline-secondary btn-sm dropdown-toggle fw-bold py-2 px-3 shadow-sm" type="button" data-bs-toggle="dropdown">
            📚 Examples
          </button>
          <ul class="dropdown-menu dropdown-menu-end shadow border-0" id="example-dropdown-menu">
            <!-- Populated by JS -->
          </ul>
        </div>
        <button class="btn btn-outline-danger btn-sm fw-bold py-2 px-3 shadow-sm" id="btn-reset-progress">Reset</button>
      </div>
    </div>
  </nav>

  <!-- OFFCANVAS LEFT MENU -->
  <div class="offcanvas offcanvas-start shadow-lg" tabindex="-1" id="leftMenu">
    <div class="offcanvas-header border-bottom bg-light">
      <h5 class="offcanvas-title fw-bold text-dark"><span class="text-primary me-2">✨</span> Menu</h5>
      <button type="button" class="btn-close shadow-none" data-bs-dismiss="offcanvas"></button>
    </div>
    <div class="offcanvas-body p-0 d-flex flex-column bg-light">
      <div class="ss-nav-panel m-0 p-3 border-bottom bg-white d-flex gap-2">
        <button class="ss-nav-btn active flex-fill rounded fw-bold shadow-sm" data-panel="guide">📖 Guide</button>
        <button class="ss-nav-btn flex-fill rounded fw-bold shadow-sm" data-panel="missions">🎯 Missions</button>
        <button class="ss-nav-btn flex-fill rounded fw-bold shadow-sm" data-panel="saved">💾 Saved</button>
      </div>
      <div class="p-3 flex-grow-1 overflow-auto ss-side-panel">
        <div id="panel-guide"></div>
        <div id="panel-missions" class="d-none"></div>
        <div id="panel-saved" class="d-none"></div>
      </div>
    </div>
  </div>

  <!-- WORKSPACE -->
  <div class="container-xl ss-workspace" id="workspace" style="padding-top: 80px; padding-bottom: 40px; min-height: 100vh;">
    
    <!-- Output Panel (Full Width, Top) -->
    <div class="mb-5 bg-white p-3 rounded-4 shadow-sm border">
      <div class="d-flex justify-content-between align-items-center mb-3">
        <h5 class="m-0 fw-bold text-dark d-flex align-items-center"><span class="me-2 fs-3">📺</span> Live Output</h5>
        <button class="btn btn-sm btn-light border fw-bold text-dark shadow-sm px-3" id="btn-reset">🔄 Reset Stage</button>
      </div>
      
      <div class="ss-stage w-100 rounded-3 shadow-inner border border-2 border-dark" id="ss-stage" style="min-height: 45vh; position: relative;"></div>

      <div class="row g-3 mt-1">
        <div class="col-lg-8 col-12">
          <div class="ss-log-panel w-100 rounded-3 shadow-sm border border-secondary" id="ss-log" style="height: 130px;"></div>
        </div>
        <div class="col-lg-4 col-12 d-flex flex-column gap-3">
          <div class="ss-score-panel w-100 rounded-3 shadow-sm d-flex align-items-center justify-content-center m-0 border" id="ss-score" style="height: 60px; font-size: 1.4rem;">🏆 Score: 0</div>
          <div class="ss-vocab-panel w-100 rounded-3 shadow-sm bg-light border" id="ss-vocab" style="height: calc(130px - 60px - 1rem); padding: 5px;"></div>
        </div>
      </div>
    </div>

    <!-- Code Editor (Full Width, Bottom) -->
    <div class="d-flex flex-column bg-white p-3 rounded-4 shadow-sm border">
      <div class="bg-dark text-white rounded-top-3 px-4 py-3 d-flex justify-content-between align-items-center shadow-sm">
        <div class="fw-bold fs-5 d-flex align-items-center"><span class="me-2">✏️</span> Your Code</div>
        <div class="d-flex gap-2">
          <button class="btn btn-sm btn-outline-light border-0 rounded fw-medium" id="btn-clear" title="Clear Code">🗑️ Clear</button>
          <button class="btn btn-sm btn-outline-light border-0 rounded fw-medium" id="btn-save" title="Save Program">💾 Save</button>
          <button class="btn btn-sm btn-outline-light border-0 rounded fw-medium" id="btn-download" title="Download Code">📥 Download</button>
        </div>
      </div>

      <div class="d-flex border border-dark border-top-0 rounded-bottom-3 ss-editor-wrap bg-dark shadow-sm position-relative" style="height: 45vh; min-height: 350px;">
        <div class="ss-line-numbers border-end border-secondary pt-3" id="ss-line-numbers" style="width: 55px; background: #1e1e1e; font-size: 1.05rem;"></div>
        <textarea class="ss-editor flex-grow-1 p-3 border-0" id="ss-editor" style="background: #252526; color: #f8f9fa; outline: none; box-shadow: none; font-size: 1.15rem; font-family: var(--font-code); line-height: 1.6;" spellcheck="false" placeholder="scene &quot;school&quot;&#10;&#10;Rafi appears&#10;Rafi says &quot;Hello!&quot;"></textarea>
      </div>

      <div class="d-flex gap-3 mt-4">
        <button class="btn btn-success flex-fill fw-bold py-3 fs-4 text-uppercase shadow-sm ss-btn-run border-0 rounded-3 text-white" id="btn-run" style="background: #10b981; transition: transform 0.2s, box-shadow 0.2s;">▶️ Run Code</button>
        <button class="btn btn-danger flex-fill fw-bold py-3 fs-4 text-uppercase shadow-sm ss-btn-stop border-0 rounded-3 d-none text-white" id="btn-stop" style="transition: transform 0.2s, box-shadow 0.2s;">⏹️ Stop Running</button>
      </div>
      
      <div class="ss-error-panel mt-3 d-none shadow-sm rounded-3 border-danger border-opacity-25" id="ss-error-panel"></div>
    </div>
    
  </div>

  <!-- Badge Popup Overlay -->
  <div class="ss-badge-overlay d-none" id="ss-badge-overlay">
    <div class="ss-badge-popup ss-anim-jump">
      <div class="ss-badge-text" id="ss-badge-text">🎉 Mission Complete!</div>
      <p class="text-muted mt-2 mb-0" style="font-size:0.9rem">Click to close</p>
    </div>
  </div>

  <!-- Toast -->
  <div id="ss-toast" class="ss-toast d-none">Saved!</div>

  <!-- Local Scripts -->
  <script src="assets/js/bootstrap.bundle.min.js"></script>
  
  <script src="assets/js/lexer.js"></script>
  <script src="assets/js/parser.js"></script>
  <script src="assets/js/errors.js"></script>
  <script src="assets/js/storage.js"></script>
  <script src="assets/js/examples.js"></script>
  <script src="assets/js/missions.js"></script>
  
  <script src="assets/js/runtime.js"></script>
  <script src="assets/js/interpreter.js"></script>
  
  <script src="assets/js/ui.js"></script>
  <script src="assets/js/app.js"></script>
</body>
</html>
